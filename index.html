    <script>
      // GitHub Pages SPA redirect: restore path from query string set by 404.html
      (function(l) {
        if (l.search[1] === 'p') {
          var path = l.search.slice(3).replace(/~and~/g, '&');
          window.history.replaceState(null, null, '/' + path + l.hash);
        }
      }(window.location));
    </script>
